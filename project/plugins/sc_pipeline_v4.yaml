name: sc_pipeline_v4
enabled: true
required: false
description: >-
  Smart Single-Cell Analysis Pipeline Manager. 
  Use this skill to load data, perform QC, identify variable genes (HVG), or cluster data.
  The pipeline is cumulative: selecting a 
  downstream stage (e.g., 'cluster') automatically executes all preceding 
  steps (QC, HVG). You should pass upstream parameters (e.g., 'min_genes' 
  or 'n_top_genes') directly to this single function call rather than 
  calling steps individually.
  It uses a smart caching system (DAG), so re-running a step with the same parameters 
  is instant and does not duplicate computation.
  Always start by providing a data_path.
  Example usage: 
  adata, summary = sc_pipeline_v4(target_stage='cluster', resolution=0.5)
  

parameters:
  - name: target_stage
    type: str
    required: true
    description: >-
      The goal of this execution.
      Options:
      - 'qc': Filter cells and calculate metrics.
      - 'hvg': Normalize and select variable genes.
      - 'cluster': Run PCA, Neighbors, and Leiden Clustering.
  
  - name: data_path
    type: str
    required: false
    description: >-
      File path to the .h5ad file. Only required for the FIRST run to initialize the pipeline.
      Subsequent calls reuse the loaded data.
  
  - name: resolution
    type: float
    required: false
    description: Resolution for Leiden clustering (higher = more clusters). Default 0.5. Used only if target is 'cluster'.
  
  - name: n_hvg
    type: int
    required: false
    description: Number of highly variable genes to select. Default 2000. Used only if target is 'hvg' or 'cluster'.
  
  - name: min_genes
    type: int
    required: false
    description: Minimum genes per cell for QC filtering. Default 200. Used only if target is 'qc'.

returns:
  - name: summary
    type: str
    description: A status report including the data shape, active state ID, and references to generated plots.