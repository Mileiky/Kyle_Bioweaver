name: run_umap
enabled: true
required: false
description: >-
  Computes nearest neighbors and UMAP embedding using Scanpy. Stores the UMAP
  coordinates in adata.obsm["X_umap"]. Optionally generates UMAP plots for selected
  marker genes.

examples:
  adata = run_umap(adata)

parameters:
  - name: adata
    type: AnnData
    required: true
    description: Input AnnData object.

  - name: n_neighbors
    type: int
    required: false
    default: 10
    description: Number of neighbors for graph construction.

  - name: min_dist
    type: float
    required: false
    default: 0.5
    description: Minimum distance parameter for UMAP.

  - name: spread
    type: float
    required: false
    default: 1.0
    description: Spread parameter for UMAP.

  - name: n_pcs
    type: int
    required: false
    default: 40
    description: Number of principal components to use for neighbor graph construction.

  - name: use_rep
    type: str
    required: false
    default: X_pca
    description: Representation in adata.obsm used for neighbor graph construction.

  - name: show_plots
    type: bool
    required: false
    default: false
    description: Whether to display UMAP plots.

returns:
  - name: adata
    type: AnnData
    description: AnnData after neighbor graph construction and UMAP embedding.
